<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mental Health Survey</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<style>
.survey-page {
    width: 100%;
    padding: 30px 20px;
    box-sizing: border-box;
}

.survey-wrapper {
    display: flex;
    gap: 30px;
    align-items: flex-start;
    width: 100%;
    max-width: 1200px;
    margin: 0 auto;
}

.survey-container {
    flex: 2;
    width: auto;
    background: rgba(255,255,255,0.96);
    padding: 35px;
    border-radius: 24px;
    box-shadow: 0 14px 34px rgba(0,0,0,0.10);
}

.survey-title {
    text-align: center;
    margin-top: 0;
    margin-bottom: 10px;
    font-size: 34px;
    color: #243b53;
}

.survey-subtitle {
    text-align: center;
    color: #627d98;
    margin-bottom: 28px;
    font-size: 15px;
}

.question-card {
    background: #f8fbff;
    border: 1px solid #edf2f7;
    border-radius: 18px;
    padding: 18px;
    margin-bottom: 16px;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.question-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 18px rgba(0,0,0,0.06);
}

.question-card label {
    display: block;
    margin-top: 0;
    margin-bottom: 10px;
    color: #334e68;
    font-weight: 600;
    font-size: 15px;
    line-height: 1.5;
}

.question-card select {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #cbd5e1;
    background: white;
    font-size: 14px;
}

.submit-wrap {
    margin-top: 24px;
    text-align: center;
}

.submit-wrap button {
    min-width: 180px;
}

.riskometer-panel {
    flex: 1;
    background: rgba(255,255,255,0.97);
    padding: 28px;
    border-radius: 24px;
    box-shadow: 0 14px 34px rgba(0,0,0,0.10);
    position: sticky;
    top: 24px;
    min-width: 300px;
}

.riskometer-panel h3 {
    margin-top: 0;
    text-align: center;
    color: #243b53;
    font-size: 28px;
}

.risk-score {
    text-align: center;
    font-size: 16px;
    color: #5c677d;
    margin-bottom: 16px;
    font-weight: 600;
}

.meter-track {
    width: 100%;
    height: 22px;
    background: #edf2f7;
    border-radius: 20px;
    overflow: hidden;
    margin: 18px 0 14px;
}

.meter-fill {
    height: 100%;
    width: 0%;
    border-radius: 20px;
    transition: width 0.4s ease;
    background: linear-gradient(90deg, #7bd389, #ffd166, #ef476f);
}

.risk-badge {
    text-align: center;
    font-size: 28px;
    font-weight: 800;
    margin: 14px 0;
}

.risk-tip {
    background: #eef8ff;
    border-radius: 14px;
    padding: 16px;
    color: #486581;
    font-size: 14px;
    line-height: 1.6;
    margin-top: 16px;
}

.risk-legend {
    margin-top: 18px;
    background: #f8f9ff;
    border-radius: 14px;
    padding: 14px;
    font-size: 13px;
    color: #52606d;
    line-height: 1.7;
}

.risk-legend span {
    font-weight: 700;
}

.legend-low { color: #2e8b57; }
.legend-moderate { color: #d4a017; }
.legend-high { color: #d62828; }

@media (max-width: 950px) {
    .survey-wrapper {
        flex-direction: column;
    }

    .riskometer-panel {
        position: static;
        width: 100%;
        min-width: unset;
    }
}

@media (max-width: 700px) {
    .survey-container,
    .riskometer-panel {
        padding: 22px;
    }

    .survey-title {
        font-size: 28px;
    }
}
</style>
</head>

<body>

<div class="survey-page">
    <div class="survey-wrapper">

        <div class="survey-container">
            <h2 class="survey-title">Mental Health Survey</h2>
            <p class="survey-subtitle">
                Please answer each question honestly. Your responses help estimate your current emotional well-being.
            </p>

            <form id="surveyForm">

                <div class="question-card">
                    <label>1. How often do you feel stressed?</label>
                    <select id="q1" required onchange="updateRiskometer()">
                        <option value="">Select</option>
                        <option value="1">Never</option>
                        <option value="2">Rarely</option>
                        <option value="3">Sometimes</option>
                        <option value="4">Often</option>
                    </select>
                </div>

                <div class="question-card">
                    <label>2. How often do you feel anxious?</label>
                    <select id="q2" required onchange="updateRiskometer()">
                        <option value="">Select</option>
                        <option value="1">Never</option>
                        <option value="2">Rarely</option>
                        <option value="3">Sometimes</option>
                        <option value="4">Often</option>
                    </select>
                </div>

                <div class="question-card">
                    <label>3. Do you have trouble sleeping?</label>
                    <select id="q3" required onchange="updateRiskometer()">
                        <option value="">Select</option>
                        <option value="1">Never</option>
                        <option value="2">Rarely</option>
                        <option value="3">Sometimes</option>
                        <option value="4">Often</option>
                    </select>
                </div>

                <div class="question-card">
                    <label>4. Do you feel low or demotivated?</label>
                    <select id="q4" required onchange="updateRiskometer()">
                        <option value="">Select</option>
                        <option value="1">Never</option>
                        <option value="2">Rarely</option>
                        <option value="3">Sometimes</option>
                        <option value="4">Often</option>
                    </select>
                </div>

                <div class="question-card">
                    <label>5. Are you able to focus on studies?</label>
                    <select id="q5" required onchange="updateRiskometer()">
                        <option value="">Select</option>
                        <option value="1">Always</option>
                        <option value="2">Mostly</option>
                        <option value="3">Sometimes</option>
                        <option value="4">Rarely</option>
                    </select>
                </div>

                <div class="question-card">
                    <label>6. Do you feel overwhelmed by academic pressure?</label>
                    <select id="q6" required onchange="updateRiskometer()">
                        <option value="">Select</option>
                        <option value="1">Never</option>
                        <option value="2">Rarely</option>
                        <option value="3">Sometimes</option>
                        <option value="4">Often</option>
                    </select>
                </div>

                <div class="question-card">
                    <label>7. Do you feel lonely?</label>
                    <select id="q7" required onchange="updateRiskometer()">
                        <option value="">Select</option>
                        <option value="1">Never</option>
                        <option value="2">Rarely</option>
                        <option value="3">Sometimes</option>
                        <option value="4">Often</option>
                    </select>
                </div>

                <div class="question-card">
                    <label>8. Do you get irritated easily?</label>
                    <select id="q8" required onchange="updateRiskometer()">
                        <option value="">Select</option>
                        <option value="1">Never</option>
                        <option value="2">Rarely</option>
                        <option value="3">Sometimes</option>
                        <option value="4">Often</option>
                    </select>
                </div>

                <div class="question-card">
                    <label>9. How often do you feel emotionally tired?</label>
                    <select id="q9" required onchange="updateRiskometer()">
                        <option value="">Select</option>
                        <option value="1">Never</option>
                        <option value="2">Rarely</option>
                        <option value="3">Sometimes</option>
                        <option value="4">Often</option>
                    </select>
                </div>

                <div class="question-card">
                    <label>10. Do you feel pressure from expectations?</label>
                    <select id="q10" required onchange="updateRiskometer()">
                        <option value="">Select</option>
                        <option value="1">Never</option>
                        <option value="2">Rarely</option>
                        <option value="3">Sometimes</option>
                        <option value="4">Often</option>
                    </select>
                </div>

                <div class="question-card">
                    <label>11. Do you avoid talking to others when stressed?</label>
                    <select id="q11" required onchange="updateRiskometer()">
                        <option value="">Select</option>
                        <option value="1">Never</option>
                        <option value="2">Rarely</option>
                        <option value="3">Sometimes</option>
                        <option value="4">Often</option>
                    </select>
                </div>

                <div class="question-card">
                    <label>12. Do you feel worried about the future?</label>
                    <select id="q12" required onchange="updateRiskometer()">
                        <option value="">Select</option>
                        <option value="1">Never</option>
                        <option value="2">Rarely</option>
                        <option value="3">Sometimes</option>
                        <option value="4">Often</option>
                    </select>
                </div>

                <div class="question-card">
                    <label>13. Do you enjoy daily activities?</label>
                    <select id="q13" required onchange="updateRiskometer()">
                        <option value="">Select</option>
                        <option value="1">Always</option>
                        <option value="2">Mostly</option>
                        <option value="3">Sometimes</option>
                        <option value="4">Rarely</option>
                    </select>
                </div>

                <div class="question-card">
                    <label>14. Do you feel mentally exhausted?</label>
                    <select id="q14" required onchange="updateRiskometer()">
                        <option value="">Select</option>
                        <option value="1">Never</option>
                        <option value="2">Rarely</option>
                        <option value="3">Sometimes</option>
                        <option value="4">Often</option>
                    </select>
                </div>

                <div class="question-card">
                    <label>15. Do you feel supported by people around you?</label>
                    <select id="q15" required onchange="updateRiskometer()">
                        <option value="">Select</option>
                        <option value="1">Always</option>
                        <option value="2">Mostly</option>
                        <option value="3">Sometimes</option>
                        <option value="4">Rarely</option>
                    </select>
                </div>

                <div class="question-card">
                    <label>16. How often do you feel hopeless?</label>
                    <select id="q16" required onchange="updateRiskometer()">
                        <option value="">Select</option>
                        <option value="1">Never</option>
                        <option value="2">Rarely</option>
                        <option value="3">Sometimes</option>
                        <option value="4">Often</option>
                    </select>
                </div>

                <div class="submit-wrap">
                    <button type="submit">Submit Survey</button>
                </div>
            </form>
        </div>

        <div class="riskometer-panel">
            <h3>Live Riskometer</h3>

            <div class="risk-score">
                Score: <span id="liveScore">0</span> / 64
            </div>

            <div class="meter-track">
                <div class="meter-fill" id="meterFill"></div>
            </div>

            <div class="risk-badge" id="liveRiskLevel">Low</div>

            <div class="risk-tip" id="liveTip">
                Start answering the survey to see your live risk level.
            </div>

            <div class="risk-legend">
                <div><span class="legend-low">Low:</span> 0–25</div>
                <div><span class="legend-moderate">Moderate:</span> 26–44</div>
                <div><span class="legend-high">High:</span> 45–64</div>
            </div>
        </div>

    </div>
</div>

<script src="{{ url_for('static', filename='js/survey.js') }}"></script>
</body>
</html>
