<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Mental Health System</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="main-container">

    <div class="left-panel">
        <h1>Student Mental Health<br>System</h1>
        <p>Your wellbeing matters. This system helps identify stress early and support timely intervention.</p>
    </div>

    <div class="form-container">
        <form method="POST" action="/login" class="form">
            <h2>Welcome Back</h2>

            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>

            <button type="submit">Login</button>

            <p>Use your email and password to enter the system.</p>
        </form>
    </div>

</div>

</body>
</html>
