<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
#overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.45);
    top: 0;
    left: 0;
    z-index: 20;
}

#guardianFormContainer {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: white;
    padding: 28px;
    border-radius: 20px;
    width: 360px;
    text-align: center;
    box-shadow: 0 18px 40px rgba(0,0,0,0.18);
    z-index: 21;
}

#guardianFormContainer h3 {
    margin-bottom: 14px;
    color: #3c3c3c;
    font-size: 24px;
}

#guardianFormContainer input {
    width: 100%;
    margin: 8px 0;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #d7d7d7;
    box-sizing: border-box;
    font-size: 14px;
}

#guardianFormContainer button {
    width: 100%;
    margin-top: 12px;
}

.dashboard-topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    margin-bottom: 30px;
    flex-wrap: wrap;
}

.dashboard-topbar h2 {
    margin: 0;
    color: #1f2937;
    font-size: 34px;
    font-weight: 700;
}

.user-chip {
    background: #eef7ff;
    color: #355070;
    padding: 10px 16px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 600;
}

.dashboard-grid {
    display: grid;
    grid-template-columns: 1fr 1.2fr;
    gap: 26px;
    align-items: start;
}

.stats-column {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
}

.stat-card {
    background: linear-gradient(180deg, #f7f9ff, #f2f4ff);
    padding: 26px 18px;
    border-radius: 24px;
    box-shadow: 0 8px 22px rgba(0,0,0,0.06);
    min-height: 185px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 12px;
}

.stat-card h3 {
    margin: 0;
    color: #243b53;
    font-size: 26px;
}

.metric-value {
    font-size: 36px;
    font-weight: 800;
    color: #111827;
    margin: 0;
}

.metric-status {
    font-size: 30px;
    font-weight: 800;
    margin: 0;
}

.metric-status.low {
    color: #2e8b57;
}

.metric-status.moderate {
    color: #d4a017;
}

.metric-status.high {
    color: #d62828;
}

.chart-card {
    background: linear-gradient(180deg, #ffffff, #f8fbff);
    border-radius: 24px;
    box-shadow: 0 10px 26px rgba(0,0,0,0.08);
    padding: 26px;
}

.chart-card h3 {
    margin-top: 0;
    margin-bottom: 16px;
    color: #243b53;
    font-size: 24px;
    text-align: left;
}

.chart-wrapper {
    width: 100%;
    max-width: 380px;
    margin: 0 auto;
}

.quick-note {
    margin-top: 18px;
    background: #eef8ff;
    padding: 14px 16px;
    border-radius: 14px;
    color: #486581;
    font-size: 14px;
    line-height: 1.5;
}

#surveyBtn {
    min-width: 140px;
}

.chatbot-container {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 370px;
    z-index: 30;
}

.chat-header {
    background: linear-gradient(90deg, #52b788, #43aa8b);
    color: white;
    padding: 14px 16px;
    cursor: pointer;
    text-align: center;
    border-radius: 18px 18px 0 0;
    font-weight: 700;
    font-size: 16px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.12);
}

.chat-box {
    display: none;
    background: white;
    border: 1px solid #d9e2ec;
    padding: 12px;
    border-radius: 0 0 18px 18px;
    box-shadow: 0 12px 28px rgba(0,0,0,0.15);
}

.messages {
    height: 260px;
    overflow-y: auto;
    margin-bottom: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding-right: 4px;
}

.messages div {
    margin: 0;
    padding: 10px 12px;
    border-radius: 12px;
    max-width: 85%;
    word-wrap: break-word;
    overflow-wrap: break-word;
    white-space: pre-wrap;
    font-size: 14px;
    line-height: 1.4;
}

.user {
    text-align: right;
    color: #0f172a;
    background: #dbeafe;
    align-self: flex-end;
}

.bot {
    text-align: left;
    color: #1f2937;
    background: #f3f4f6;
    align-self: flex-start;
}

.chat-input {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 8px;
    align-items: center;
}

.chat-input input {
    margin: 0;
    min-width: 0;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #cfd8e3;
    font-size: 14px;
}

.chat-input button {
    margin: 0;
    padding: 11px 14px;
    border-radius: 10px;
    font-size: 14px;
}

#voiceToggleBtn {
    min-width: 48px;
    background: #ffd6a5;
    color: #222;
    font-size: 18px;
    font-weight: 700;
    display: inline-flex;
    justify-content: center;
    align-items: center;
}

#voiceToggleBtn:hover {
    background: #ffc078;
}

@media (max-width: 1100px) {
    .dashboard-grid {
        grid-template-columns: 1fr;
    }

    .stats-column {
        grid-template-columns: 1fr 1fr;
    }
}

@media (max-width: 700px) {
    .dashboard-topbar h2 {
        font-size: 26px;
    }

    .stats-column {
        grid-template-columns: 1fr;
    }

    .chatbot-container {
        width: calc(100% - 24px);
        right: 12px;
        bottom: 12px;
    }

    .chat-input {
        grid-template-columns: 1fr;
    }

    #voiceToggleBtn {
        width: 100%;
    }

    #guardianFormContainer {
        width: 90%;
    }
}
</style>
</head>

<body class="dashboard-body">

<div class="dashboard-container">

    <div class="dashboard-topbar">
        <h2>Student Dashboard</h2>
        <div class="user-chip">{{ session['user'] }}</div>
    </div>

    <div class="dashboard-grid">

        <div class="stats-column">
            <div class="stat-card">
                <h3>Stress Score</h3>
                <p id="stressScore" class="metric-value">0</p>
                <button id="surveyBtn" onclick="goToSurvey()" disabled>Take Survey</button>
            </div>

            <div class="stat-card">
                <h3>Status</h3>
                <p id="stressStatus" class="metric-status">No Data</p>
            </div>
        </div>

        <div class="chart-card">
            <h3>Stress Overview</h3>
            <div class="chart-wrapper">
                <canvas id="stressChart"></canvas>
            </div>
            <div class="quick-note">
                This overview shows your current stress score based on the latest survey submission.
                Higher values indicate a greater need for care, balance, and support.
            </div>
        </div>

    </div>

</div>

<div id="overlay"></div>

<div id="guardianFormContainer">
    <h3>Guardian Details</h3>
    <input id="guardianName" placeholder="Guardian Name">
    <input id="guardianEmail" placeholder="Guardian Email">
    <input id="guardianPhone" placeholder="+91XXXXXXXXXX (optional)">
    <button onclick="saveGuardian()">Save Details</button>
</div>

<div class="chatbot-container">
    <div class="chat-header" onclick="toggleChat()">Chat Support 💬</div>

    <div class="chat-box" id="chatBox">
        <div id="messages" class="messages"></div>

        <div class="chat-input">
            <input id="userInput" placeholder="Type your message..." onkeypress="handleKey(event)">
            <button onclick="sendMessage()">Send</button>
            <button id="voiceToggleBtn" onclick="toggleVoice()" title="Toggle voice">🔊</button>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
