<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
}
h1 {
    margin: 20px;
}
table {
    width: 90%;
    margin: auto;
    border-collapse: collapse;
    background: #1e293b;
    border-radius: 10px;
    overflow: hidden;
}
th, td {
    padding: 12px;
    border-bottom: 1px solid #334155;
}
th {
    background: #3b82f6;
}
tr:hover {
    background: #334155;
}
.high {
    color: red;
    font-weight: bold;
}
.low {
    color: lightgreen;
}
.moderate {
    color: #ffd166;
    font-weight: bold;
}
button {
    padding: 5px 10px;
    border: none;
    border-radius: 5px;
    color: white;
    cursor: pointer;
}
button.sent {
    background-color: red;
}
button.disabled {
    background-color: grey;
    cursor: not-allowed;
}
</style>
</head>

<body>

<h1>📊 Admin Panel</h1>

<table>
<tr>
<th>Email</th>
<th>Risk</th>
<th>Score</th>
<th>Time</th>
<th>Action</th>
</tr>

{% for r in results %}
<tr>
<td>{{ r[0] }}</td>
<td class="{% if r[1]=='HIGH' %}high{% elif r[1]=='MODERATE' %}moderate{% else %}low{% endif %}">
    {{ r[1] }}
</td>
<td>{{ r[2] }}</td>
<td>{{ r[3] }}</td>
<td>
    {% if r[1] == 'HIGH' %}
    <button class="sent" disabled>Notification Sent</button>
    {% else %}
    <button class="disabled" disabled>-</button>
    {% endif %}
</td>
</tr>
{% endfor %}

</table>

</body>
</html>
